aid: supermaven
name: Supermaven
description: >-
  Supermaven was an AI code completion tool founded by Jacob Jackson
  (previously co-founder of Tabnine) and known for shipping the first
  code completion product with a 1,000,000-token context window — over
  thirty times the context of contemporary copilots — backed by the
  in-house Babble model and roughly 250 ms response latency. Supermaven
  delivered plugins for VS Code, JetBrains IDEs, and Neovim, plus a chat
  surface that proxied GPT-4o, Claude 3.5 Sonnet, and GPT-4 alongside
  inline completions, style adaptation, and codebase-aware suggestions.
  Anysphere — the company behind the Cursor AI code editor — acquired
  Supermaven on 12 November 2024 to power Cursor's next-generation Tab
  model, and on 21 November 2025 Supermaven was formally sunset:
  subscribers received prorated refunds, agent/chat features were
  retired, VS Code users were migrated to Cursor, and free autocomplete
  inference continues for existing JetBrains and Neovim users for the
  foreseeable future. There is no public developer API, OpenAPI spec,
  or SDK — Supermaven shipped as an IDE plugin product, and its
  long-context completion technology now lives inside Cursor.
